<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Bintang Arya | Home</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background: #0a0a1f;
      color: #1e90ff;
      line-height: 1.6;
      min-height: 100vh;
      overflow-x: hidden;
    }

    /* Navbar */
    .navbar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 15px 40px;
      position: fixed;
      width: 100%;
      top: 0;
      background: rgba(10, 10, 30, 0.8);
      backdrop-filter: blur(15px);
      z-index: 100;
      border-bottom: 1px solid rgba(30, 144, 255, 0.2);
    }

    .logo {
      font-size: 1.8rem;
      font-weight: 700;
      background: linear-gradient(45deg, #1e90ff, #00ffff);
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
    }

    .navbar a {
      color: #1e90ff;
      margin-left: 20px;
      text-decoration: none;
      font-weight: 500;
      transition: 0.3s;
      padding: 5px 10px;
      border-radius: 5px;
    }

    .navbar a:hover,
    .navbar a.active {
      color: #00ffff;
      background: rgba(30, 144, 255, 0.1);
    }

    /* Hero section */
    .hero {
      height: 100vh;
      display: flex;
      flex-direction: column;
      justify-content: center;
      padding-left: 60px;
      position: relative;
      z-index: 1;
    }

    .hero-box {
      position: relative;
      z-index: 2;
      max-width: 800px;
      padding: 20px;
    }

    .hero-box h1 {
      font-size: clamp(2.5rem, 6vw, 4rem);
      margin-bottom: 15px;
      line-height: 1.2;
      color: #1e90ff;
      text-shadow: 0 0 20px rgba(30, 144, 255, 0.5);
    }

    /* Typing text */
    #typing {
      color: #00ffff;
      margin-top: 5px;
      font-weight: 400;
      min-height: 40px;
      font-size: 1.3rem;
      border-right: 2px solid #00ffff;
      display: inline-block;
      padding-right: 5px;
      animation: blink 0.7s infinite;
    }

    @keyframes blink {
      0%, 100% { border-color: #00ffff; }
      50% { border-color: transparent; }
    }

    /* Buttons */
    .btn {
      display: inline-block;
      margin-top: 20px;
      background: #1e90ff;
      color: #0a0a1f;
      padding: 12px 25px;
      border-radius: 30px;
      text-decoration: none;
      font-weight: 600;
      transition: all 0.3s ease;
      border: none;
      cursor: pointer;
      box-shadow: 0 4px 15px rgba(30, 144, 255, 0.3);
    }

    .btn:hover {
      background: #00ffff;
      color: #0a0a1f;
      transform: translateY(-3px);
      box-shadow: 0 6px 20px rgba(0, 255, 255, 0.4);
    }

    .btn-outline {
      background: transparent;
      border: 2px solid #1e90ff;
      color: #1e90ff;
    }

    .btn-outline:hover {
      background: #1e90ff;
      color: #0a0a1f;
      border-color: #00ffff;
    }

    .hero-buttons {
      display: flex;
      gap: 15px;
      margin-top: 20px;
      flex-wrap: wrap;
    }

    /* Cards */
    .card {
      background: rgba(12, 12, 26, 0.9);
      backdrop-filter: blur(10px);
      max-width: 450px;
      margin: 120px auto 40px;
      padding: 30px;
      border-radius: 20px;
      box-shadow: 0 0 30px rgba(30, 144, 255, 0.2);
      text-align: center;
      border: 1px solid rgba(30, 144, 255, 0.1);
    }

    .contact-card {
      max-width: 450px;
    }

    /* Profile */
    .profile-container {
      position: relative;
      width: 140px;
      height: 140px;
      margin: 0 auto 20px;
    }

    .profile {
      width: 100%;
      height: 100%;
      border-radius: 50%;
      border: 3px solid #1e90ff;
      object-fit: cover;
      position: relative;
      z-index: 2;
      box-shadow: 0 0 20px rgba(30, 144, 255, 0.3);
      transition: transform 0.3s ease;
    }

    .profile:hover {
      transform: scale(1.05);
    }

    .profile-glow {
      position: absolute;
      top: -5px;
      left: -5px;
      right: -5px;
      bottom: -5px;
      border-radius: 50%;
      background: linear-gradient(45deg, #1e90ff, #00ffff, #1e90ff);
      filter: blur(10px);
      opacity: 0.5;
      z-index: 1;
      animation: glowPulse 3s infinite;
    }

    @keyframes glowPulse {
      0%, 100% { opacity: 0.3; transform: scale(1); }
      50% { opacity: 0.6; transform: scale(1.1); }
    }

    .glow-text {
      color: #1e90ff;
      text-shadow: 0 0 10px rgba(30, 144, 255, 0.5);
      margin-bottom: 20px;
      font-size: 1.8rem;
    }

    /* Bio items */
    .bio-item {
      display: flex;
      justify-content: space-between;
      margin: 15px 0;
      padding: 10px 0;
      border-bottom: 1px solid rgba(30, 144, 255, 0.1);
    }

    .bio-item:last-child {
      border-bottom: none;
    }

    .bio-label {
      font-weight: 600;
      color: #00ffff;
    }

    .social-links {
      margin-top: 25px;
      display: flex;
      justify-content: center;
      gap: 15px;
    }

    /* Contact page */
    .contact-desc {
      margin: 15px 0 20px;
      color: #aaa;
      font-style: italic;
    }

    .contact-links {
      display: flex;
      flex-direction: column;
      gap: 12px;
      margin: 25px 0;
    }

    .contact-btn {
      margin-top: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
    }

    .btn-icon {
      font-size: 1.2rem;
    }

    .contact-info {
      margin-top: 25px;
      padding-top: 20px;
      border-top: 1px solid rgba(30, 144, 255, 0.2);
    }

    .contact-info p {
      margin: 8px 0;
      color: #1e90ff;
    }

    /* Music control */
    .music-control {
      position: fixed;
      bottom: 30px;
      right: 30px;
      background: rgba(10, 10, 30, 0.9);
      backdrop-filter: blur(10px);
      border: 2px solid #1e90ff;
      border-radius: 50px;
      padding: 12px 24px;
      display: flex;
      align-items: center;
      gap: 10px;
      color: #1e90ff;
      cursor: pointer;
      z-index: 1000;
      transition: all 0.3s ease;
      box-shadow: 0 0 20px rgba(30, 144, 255, 0.3);
    }

    .music-control:hover {
      background: #1e90ff;
      color: #0a0a1f;
      transform: translateY(-3px);
      box-shadow: 0 0 30px rgba(30, 144, 255, 0.4);
    }

    .music-icon {
      font-size: 1.3rem;
    }

    .music-text {
      font-weight: 600;
      font-size: 0.9rem;
    }

    .music-control.playing {
      border-color: #00ffff;
      animation: musicPulse 2s infinite;
    }

    @keyframes musicPulse {
      0%, 100% { box-shadow: 0 0 20px rgba(0, 255, 255, 0.3); }
      50% { box-shadow: 0 0 30px rgba(0, 255, 255, 0.6); }
    }

    .pulse-animation {
      animation: pulse 1.5s infinite;
    }

    @keyframes pulse {
      0%, 100% { transform: scale(1); }
      50% { transform: scale(1.05); }
    }

    /* Scroll reveal */
    .reveal {
      opacity: 0;
      transform: translateY(30px);
      transition: all 0.6s cubic-bezier(0.4, 0, 0.2, 1);
    }

    .reveal.active {
      opacity: 1;
      transform: translateY(0);
    }

    /* Loading screen */
    #loading {
      position: fixed;
      inset: 0;
      background: #0a0a1f;
      color: #1e90ff;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      z-index: 9999;
      font-weight: bold;
      font-size: 1.2rem;
      transition: opacity 0.5s ease;
    }

    .loader {
      width: 40px;
      height: 40px;
      border: 3px solid rgba(30, 144, 255, 0.3);
      border-top-color: #1e90ff;
      border-radius: 50%;
      animation: spin 1s infinite linear;
      margin-bottom: 15px;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    .loading-sub {
      font-size: 0.9rem;
      opacity: 0.7;
      margin-top: 10px;
    }

    /* Canvas particles */
    canvas {
      position: absolute;
      inset: 0;
      z-index: 0;
      pointer-events: none;
    }

    /* Responsive */
    @media (max-width: 768px) {
      .navbar {
        padding: 12px 20px;
      }
      
      .navbar a {
        margin-left: 10px;
        font-size: 0.9rem;
      }
      
      .hero {
        padding-left: 20px;
      }
      
      .hero-buttons {
        flex-direction: column;
        gap: 10px;
      }
      
      .card {
        margin: 100px 20px 40px;
        padding: 20px;
      }
      
      .bio-item {
        flex-direction: column;
        align-items: flex-start;
        gap: 5px;
      }
      
      .music-control {
        bottom: 20px;
        right: 20px;
        padding: 12px 18px;
      }
      
      .profile-container {
        width: 120px;
        height: 120px;
      }
    }

    @media (max-width: 480px) {
      .logo {
        font-size: 1.4rem;
      }
      
      .navbar a {
        margin-left: 8px;
        font-size: 0.8rem;
        padding: 4px 6px;
      }
      
      #typing {
        font-size: 1rem;
      }
      
      .music-text {
        display: none;
      }
      
      .music-control {
        padding: 12px;
        border-radius: 50%;
      }
      
      .music-icon {
        font-size: 1.5rem;
      }
    }
  </style>
</head>
<body>

<div id="loading">
  <div class="loader"></div>
  <p>Loading...</p>
  <p class="loading-sub">Memuat Musik & Konten ⚡</p>
</div>

<nav class="navbar">
  <h2 class="logo">Bintang.</h2>
  <div>
    <a href="index.html" class="active">Home</a>
    <a href="about.html">About</a>
    <a href="contact.html">Contact</a>
  </div>
</nav>

<section class="hero">
  <div class="hero-box reveal">
    <h1>BINTANG ARYA</h1>
    <p id="typing"></p>
    <div class="hero-buttons">
      <a href="about.html" class="btn">✨ Lihat Biodata ✨</a>
      <a href="contact.html" class="btn btn-outline">📞 Contact</a>
    </div>
  </div>
  <canvas id="particles"></canvas>
</section>

<!-- Audio BGM -->
<audio id="bgm" loop preload="auto">
  <source src="bgm.mp3" type="audio/mpeg">
  Browser kamu tidak support audio player.
</audio>

<!-- Tombol kontrol musik -->
<div class="music-control" id="musicToggle">
  <span class="music-icon">🎵</span>
  <span class="music-text">BG Music</span>
</div>

<script src="script.js"></script>
</body>
  </html>
